services:
  rampa_dev:
    # Artık hazır image yerine kendi Dockerfile'ımızı kullanıyoruz
    build: .
    ports:
      - "6080:80"     # Browser display
      - "10000:10000" # Unity Bridge
    shm_size: "2g"
    environment:
      - RESOLUTION=1280x720
    volumes:
      - ./Ros/catkin_ws:/home/ubuntu/catkin_ws